<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FCD100" />
    <title>Yellow Collective Offline</title>
    <style>
      :root {
        color-scheme: light;
        background: #fff7bf;
        color: #181818;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 2px solid #181818;
        border-radius: 18px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 4px 0 #bbb;
      }

      img {
        display: block;
        width: 120px;
        height: auto;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        font-size: 18px;
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        background: #fcd100;
        color: #181818;
        padding: 0 18px;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 4px 0 #b89400;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/noggles.svg" alt="Yellow Collective" />
      <h1>You are offline.</h1>
      <p>
        Reconnect to load live auctions, wallet actions, votes, and community
        data.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
